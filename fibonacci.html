<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Fibonacci Grid Pro | Beaver Trading</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      margin: 0;
      min-height: 100vh;
      padding: 20px;
    }
    .main-card {
      max-width: 1000px;
      width: 100%;
      background: #f8fafc;
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      margin: 0 auto;
      overflow: hidden;
      padding: 1.8rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 0.25rem 0;
      background: linear-gradient(135deg, #f97316, #dc2626);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .sub {
      color: #475569;
      border-left: 4px solid #f97316;
      padding-left: 14px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    .direction-buttons, .action-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .dir-btn, .action-btn {
      flex: 1;
      padding: 12px 20px;
      border-radius: 1rem;
      font-weight: 800;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .dir-btn.sell-active {
      background: #dc2626;
      border-color: #dc2626;
      color: white;
    }
    .dir-btn.buy-active {
      background: #16a34a;
      border-color: #16a34a;
      color: white;
    }
    .action-btn {
      background: #1e293b;
      color: white;
      border: none;
    }
    .action-btn:hover {
      background: #f97316;
      transform: translateY(-2px);
    }
    .input-panel {
      background: white;
      border-radius: 1.5rem;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      border: 1px solid #e2e8f0;
    }
    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    .field {
      flex: 1;
      min-width: 130px;
    }
    .field label {
      display: block;
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #f97316;
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 0.8rem;
      border: 2px solid #e2e8f0;
      font-weight: 600;
      font-size: 0.9rem;
      font-family: monospace;
    }
    .btn-calc {
      background: #1e293b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }
    .fib-table, .grid-card, .history-card {
      background: white;
      border-radius: 1.2rem;
      overflow: hidden;
      margin-bottom: 1.5rem;
      border: 1px solid #e2e8f0;
    }
    .fib-header, .grid-header, .history-header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      padding: 0.8rem 1.2rem;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
    }
    .fib-row, .grid-row {
      display: flex;
      justify-content: space-between;
      padding: 0.7rem 1.2rem;
      border-bottom: 1px solid #f1f5f9;
      flex-wrap: wrap;
      gap: 5px;
    }
    .grid-row:last-child, .fib-row:last-child {
      border-bottom: none;
    }
    .fib-level { font-weight: 800; color: #f97316; min-width: 70px; }
    .fib-price { font-family: monospace; font-weight: 700; }
    .level-name, .grid-level { font-weight: 800; color: #f97316; min-width: 70px; }
    .level-price, .grid-price { font-family: monospace; font-weight: 700; }
    .tag-sell { background: #fee2e2; color: #dc2626; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
    .tag-buy { background: #dcfce7; color: #16a34a; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
    .tag-resist, .tag-support { padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; background: #ffedd5; color: #f97316; }
    .history-list { max-height: 300px; overflow-y: auto; }
    .history-item {
      padding: 0.8rem;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .history-item:hover { background: #f1f5f9; }
    @media (max-width: 600px) {
      .main-card { padding: 1rem; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="main-card" id="reportContent">
  <h1>📊 Fibonacci Grid Pro</h1>
  <div class="sub">Beaver Trading | Análisis Técnico + Niveles Fibonacci</div>

  <div class="direction-buttons">
    <div id="btnSellMode" class="dir-btn sell-active">🔻 SELL (Bearish)</div>
    <div id="btnBuyMode" class="dir-btn">📈 BUY (Bullish)</div>
  </div>
  <div class="action-buttons">
    <button id="downloadPDFBtn" class="action-btn">📄 DESCARGAR PDF</button>
    <button id="saveOperationBtn" class="action-btn">💾 GUARDAR OPERACIÓN</button>
  </div>

  <div class="input-panel">
    <div class="input-group">
      <div class="field"><label>🔺 MÁXIMO</label><input type="text" id="maxInput" value="75996.29"></div>
      <div class="field"><label>🔻 MÍNIMO</label><input type="text" id="minInput" value="60000.00"></div>
      <button class="btn-calc" id="updateBtn">⟳ CALCULAR</button>
    </div>
  </div>

  <div class="fib-table">
    <div class="fib-header"><span>📐 NIVELES FIBONACCI</span><span id="modeIndicator">🔻 Modo SELL</span></div>
    <div id="fibLevelsList"></div>
  </div>

  <div style="margin: 1rem 0 0.5rem;"><strong>🎯 SELECCIONA EL RANGO PARA LA CUADRÍCULA:</strong></div>
  <div class="grid-buttons" style="display:flex; gap:1rem; margin-bottom:1rem;">
    <div id="btnRange1" class="dir-btn" style="flex:1; text-align:center;">📊 0% → 23.6%</div>
    <div id="btnRange2" class="dir-btn" style="flex:1; text-align:center;">📈 76.2% → 100%</div>
  </div>
  <div id="gridDynamicContainer"></div>

  <div class="history-card">
    <div class="history-header">📜 HISTORIAL DE OPERACIONES GUARDADAS</div>
    <div id="historyList" class="history-list"></div>
  </div>
</div>

<script>
  let currentMax = 75996.29;
  let currentMin = 60000.00;
  let activeRange = null;
  let isBuyMode = false;

  const maxInput = document.getElementById('maxInput');
  const minInput = document.getElementById('minInput');
  const updateBtn = document.getElementById('updateBtn');
  const btnRange1 = document.getElementById('btnRange1');
  const btnRange2 = document.getElementById('btnRange2');
  const btnSellMode = document.getElementById('btnSellMode');
  const btnBuyMode = document.getElementById('btnBuyMode');
  const modeIndicator = document.getElementById('modeIndicator');
  const gridContainer = document.getElementById('gridDynamicContainer');
  const fibLevelsList = document.getElementById('fibLevelsList');
  const downloadPDFBtn = document.getElementById('downloadPDFBtn');
  const saveOperationBtn = document.getElementById('saveOperationBtn');
  const historyList = document.getElementById('historyList');

  let operationsHistory = JSON.parse(localStorage.getItem('fibonacci_operations') || '[]');

  function formatPrice(value) {
    return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).replace(/,/g, '');
  }

  function getFibonacciRaw(max, min) {
    const diff = max - min;
    return {
      '0%': max,
      '23.6%': max - (diff * 0.236),
      '38.2%': max - (diff * 0.382),
      '50.0%': max - (diff * 0.50),
      '76.2%': max - (diff * 0.762),
      '100%': min
    };
  }

  function renderFibonacciTable() {
    const raw = getFibonacciRaw(currentMax, currentMin);
    const fibOrder = ['0%', '23.6%', '38.2%', '50.0%', '76.2%', '100%'];
    let html = '';
    fibOrder.forEach(level => {
      const price = raw[level];
      let zoneText = '';
      if (!isBuyMode) {
        if (level === '0%') zoneText = '🔴 Zona Resistencia';
        else if (level === '100%') zoneText = '🟢 Zona Soporte Fuerte';
        else if (level === '76.2%') zoneText = '🟢 Zona de soporte';
        else if (level === '23.6%' || level === '38.2%') zoneText = '🟡 Zona de transición';
        else if (level === '50.0%') zoneText = '🟡 Nivel medio';
      } else {
        if (level === '0%') zoneText = '🟢 Zona Soporte (máximo)';
        else if (level === '100%') zoneText = '🔴 Zona Resistencia (mínimo)';
        else if (level === '76.2%') zoneText = '🟢 Zona de soporte intermedio';
        else if (level === '23.6%' || level === '38.2%') zoneText = '🟡 Zona de transición inversa';
        else if (level === '50.0%') zoneText = '🟡 Nivel medio';
      }
      html += `<div class="fib-row"><div class="fib-level">${level}</div><div class="fib-price">${formatPrice(price)}</div><div class="fib-zone" style="font-size:0.7rem;">${zoneText}</div></div>`;
    });
    fibLevelsList.innerHTML = html;
    modeIndicator.innerText = isBuyMode ? '📈 Modo BUY' : '🔻 Modo SELL';
  }

  function generateGrid(rangeType, maxVal, minVal, buyMode) {
    const diffTotal = maxVal - minVal;
    const fibRaw = getFibonacciRaw(maxVal, minVal);
    let startPrice, endPrice, zoneLeftRaw, zoneRightRaw;
    if (rangeType === 'first') {
      const price0 = fibRaw['0%'], price236 = fibRaw['23.6%'];
      if (!buyMode) { startPrice = price0; endPrice = price236; zoneLeftRaw = '0%'; zoneRightRaw = '23.6%'; }
      else { startPrice = price236; endPrice = price0; zoneLeftRaw = '23.6%'; zoneRightRaw = '0%'; }
    } else {
      const price762 = fibRaw['76.2%'], price100 = fibRaw['100%'];
      if (!buyMode) { startPrice = price762; endPrice = price100; zoneLeftRaw = '76.2%'; zoneRightRaw = '100%'; }
      else { startPrice = price100; endPrice = price762; zoneLeftRaw = '100%'; zoneRightRaw = '76.2%'; }
    }
    const pctsFirst = [4.72, 9.44, 14.16, 18.88];
    let internalPoints = [];
    if (rangeType === 'first') {
      internalPoints = pctsFirst.map(pct => ({ pct: pct, price: maxVal - (diffTotal * pct / 100) }));
    } else {
      internalPoints = pctsFirst.map(inc => ({ pct: 76.2 + inc, price: maxVal - (diffTotal * (76.2 + inc) / 100) }));
    }
    internalPoints.sort((a,b) => b.price - a.price);
    const rows = internalPoints.map((point, idx) => {
      let tag;
      if (!buyMode) tag = idx < 2 ? 'sell' : 'buy';
      else tag = idx < 2 ? 'buy' : 'sell';
      return { levelName: `${point.pct.toFixed(2)}%`, price: point.price, tag: tag };
    });
    return { zoneResistance: startPrice, zoneSupport: endPrice, zoneNameLeft: zoneLeftRaw, zoneNameRight: zoneRightRaw, rows };
  }

  function renderGrid() {
    if (!activeRange) { 
      gridContainer.innerHTML = '<div style="padding:2rem;text-align:center;">📌 Selecciona un rango para ver la cuadrícula</div>'; 
      return; 
    }
    const gridData = generateGrid(activeRange, currentMax, currentMin, isBuyMode);
    let html = `<div class="grid-card"><div class="grid-header">📌 CUADRÍCULA: ${gridData.zoneNameLeft} → ${gridData.zoneNameRight} ${isBuyMode ? '(MODO BUY)' : '(MODO SELL)'}</div>`;
    html += `<div class="grid-row" style="background:#faf7f0;font-weight:800;"><div class="level-name">NIVEL</div><div class="level-price">PRECIO</div><div class="level-tag">SEÑAL</div></div>`;
    const resistTag = isBuyMode ? '🟢 Zona SOPORTE (Entrada BUY)' : '🔴 Zona RESISTENCIA';
    html += `<div class="grid-row"><div class="level-name">🏔️ ${gridData.zoneNameLeft}</div><div class="level-price">${formatPrice(gridData.zoneResistance)}</div><div class="level-tag"><span class="tag-resist">${resistTag}</span></div></div>`;
    for (let row of gridData.rows) {
      const tagClass = row.tag === 'sell' ? 'tag-sell' : 'tag-buy';
      const tagText = row.tag === 'sell' ? '🔻 SELL' : '📈 BUY';
      html += `<div class="grid-row"><div class="level-name">📊 ${row.levelName}</div><div class="level-price">${formatPrice(row.price)}</div><div class="level-tag"><span class="${tagClass}">${tagText}</span></div></div>`;
    }
    const supportTag = isBuyMode ? '🔴 Zona RESISTENCIA (Take Profit)' : '🟢 Zona SOPORTE';
    html += `<div class="grid-row"><div class="level-name">⛰️ ${gridData.zoneNameRight}</div><div class="level-price">${formatPrice(gridData.zoneSupport)}</div><div class="level-tag"><span class="tag-support">${supportTag}</span></div></div>`;
    html += `</div>`;
    gridContainer.innerHTML = html;
  }

  function saveOperation() {
    const now = new Date();
    const operation = {
      date: now.toLocaleString(),
      max: currentMax,
      min: currentMin,
      mode: isBuyMode ? 'BUY' : 'SELL',
      timestamp: Date.now()
    };
    operationsHistory.unshift(operation);
    if (operationsHistory.length > 20) operationsHistory.pop();
    localStorage.setItem('fibonacci_operations', JSON.stringify(operationsHistory));
    renderHistory();
    alert('✅ Operación guardada');
  }

  function renderHistory() {
    if (operationsHistory.length === 0) {
      historyList.innerHTML = '<div style="padding:1rem;text-align:center;">📭 No hay operaciones guardadas</div>';
      return;
    }
    let html = '';
    operationsHistory.forEach((op, idx) => {
      html += `<div class="history-item" onclick="loadOperation(${idx})">
        <strong>${op.date}</strong> | ${op.mode} | Máx: ${formatPrice(op.max)} | Mín: ${formatPrice(op.min)}
      </div>`;
    });
    historyList.innerHTML = html;
  }

  window.loadOperation = function(idx) {
    const op = operationsHistory[idx];
    currentMax = op.max;
    currentMin = op.min;
    maxInput.value = formatPrice(currentMax);
    minInput.value = formatPrice(currentMin);
    isBuyMode = (op.mode === 'BUY');
    if (isBuyMode) { btnBuyMode.classList.add('buy-active'); btnSellMode.classList.remove('sell-active'); }
    else { btnSellMode.classList.add('sell-active'); btnBuyMode.classList.remove('buy-active'); }
    renderFibonacciTable();
    if (activeRange) renderGrid();
  };

  function updateAllValues() {
    let rawMax = maxInput.value.replace(/,/g, '');
    let rawMin = minInput.value.replace(/,/g, '');
    let newMax = parseFloat(rawMax);
    let newMin = parseFloat(rawMin);
    if (isNaN(newMax) || isNaN(newMin) || newMax <= newMin) {
      alert("❌ Valores inválidos");
      return;
    }
    currentMax = newMax;
    currentMin = newMin;
    maxInput.value = formatPrice(currentMax);
    minInput.value = formatPrice(currentMin);
    renderFibonacciTable();
    if (activeRange) renderGrid();
  }

  function setActiveRange(range) {
    activeRange = range;
    btnRange1.style.background = range === 'first' ? '#f97316' : 'white';
    btnRange1.style.color = range === 'first' ? 'white' : '#1e293b';
    btnRange2.style.background = range === 'second' ? '#f97316' : 'white';
    btnRange2.style.color = range === 'second' ? 'white' : '#1e293b';
    renderGrid();
  }

  function setBuyMode(mode) {
    isBuyMode = mode;
    if (isBuyMode) { btnBuyMode.classList.add('buy-active'); btnSellMode.classList.remove('sell-active'); }
    else { btnSellMode.classList.add('sell-active'); btnBuyMode.classList.remove('buy-active'); }
    renderFibonacciTable();
    if (activeRange) renderGrid();
  }

  async function downloadPDF() {
    const element = document.getElementById('reportContent');
    const originalOverflow = element.style.overflow;
    element.style.overflow = 'visible';
    const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#f8fafc' });
    element.style.overflow = originalOverflow;
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const imgWidth = 190;
    const pageHeight = 277;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    let heightLeft = imgHeight;
    let position = 10;
    pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }
    pdf.save(`BeaverTrading_Fibonacci_${new Date().toISOString().slice(0,19)}.pdf`);
  }

  btnSellMode.onclick = () => setBuyMode(false);
  btnBuyMode.onclick = () => setBuyMode(true);
  btnRange1.onclick = () => setActiveRange('first');
  btnRange2.onclick = () => setActiveRange('second');
  updateBtn.onclick = updateAllValues;
  downloadPDFBtn.onclick = downloadPDF;
  saveOperationBtn.onclick = saveOperation;

  renderFibonacciTable();
  renderHistory();
</script>
</body>
</html>
