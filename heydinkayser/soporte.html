<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>HEYDIN KAYSER TRADING - Documentos VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', 'Orbitron', 'Syne', sans-serif;
            background: #03050b;
            color: #eef5ff;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* FONDO PRINCIPAL CON IMAGEN HEYDIN.jpg TRANSPARENTE */
        .bg-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/welding30001994/heydin-kayser-vip/refs/heads/main/heydinkayser/HEYDIN.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0.32;
            z-index: 0;
            pointer-events: none;
        }

        /* OVERLAY NEÓN + GRID FUTURISTA */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.07) 0px, rgba(0, 255, 255, 0.07) 1px, transparent 1px, transparent 45px),
                repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.07) 0px, rgba(0, 255, 255, 0.07) 1px, transparent 1px, transparent 45px);
            z-index: 1;
            pointer-events: none;
        }

        .glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.08), rgba(0, 0, 0, 0.8));
            z-index: 2;
            pointer-events: none;
        }

        /* CONTENIDO PRINCIPAL */
        .content {
            position: relative;
            z-index: 15;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* LOADER FUTURISTA */
        .loader-container {
            position: fixed;
            inset: 0;
            background: #01010b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
            backdrop-filter: blur(12px);
        }
        .loader-container.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 3px solid rgba(0,255,255,0.2);
            border-top: 3px solid #0cf;
            border-right: 3px solid #f0f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 25px cyan;
        }
        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }
        .loader-text {
            margin-top: 25px;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(45deg, cyan, #ff44e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* HEADER GLASS */
        .glass-header {
            background: rgba(5, 10, 20, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 255, 255, 0.5);
            padding: 0.8rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .logo-icon {
            font-size: 2rem;
            color: #0cf;
            filter: drop-shadow(0 0 8px cyan);
        }
        .logo-text {
            font-size: 1.4rem;
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, #fff, #0cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .back-home {
            background: rgba(0, 255, 255, 0.1);
            border: 1.5px solid #0cf;
            border-radius: 40px;
            padding: 8px 20px;
            color: #0cf;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-home:hover {
            background: #0cf;
            color: #000;
            box-shadow: 0 0 20px cyan;
        }

        /* TÍTULO PRINCIPAL */
        .hero-section {
            text-align: center;
            padding: 3rem 1rem 2rem;
        }
        .hero-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            background: linear-gradient(45deg, #fff, cyan, #ff44e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0,255,255,0.5);
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }
        .hero-subtitle {
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: #b3e4ff;
            text-shadow: 0 0 10px rgba(0,255,255,0.3);
            max-width: 700px;
            margin: 0 auto;
        }

        /* BARRA DE BÚSQUEDA FUTURISTA */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }
        .search-box {
            width: 100%;
            padding: 16px 25px;
            background: rgba(12, 20, 32, 0.7);
            border: 1.5px solid rgba(0, 255, 255, 0.4);
            border-radius: 60px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: cyan;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }
        .search-icon {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: cyan;
            font-size: 1.2rem;
            pointer-events: none;
        }

        /* GRID DE DOCUMENTOS (CARPETAS) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 20px 0 40px;
        }
        @media (max-width: 640px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 18px;
            }
        }
        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 15px;
            }
        }

        .folder {
            background: rgba(12, 20, 32, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 1.8rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .folder:active {
            transform: scale(0.97);
            border-color: cyan;
            box-shadow: 0 0 25px cyan;
        }
        @media (min-width: 1024px) {
            .folder:hover {
                transform: translateY(-8px);
                border-color: #ff44e6;
                box-shadow: 0 15px 35px rgba(255, 68, 230, 0.3);
            }
        }
        .folder-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            color: cyan;
            text-shadow: 0 0 15px cyan;
        }
        .folder-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #0cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }
        .folder-number {
            font-size: 0.8rem;
            color: #9bbce0;
            letter-spacing: 1px;
        }
        @media (max-width: 480px) {
            .folder-icon { font-size: 2.2rem; }
            .folder-name { font-size: 0.95rem; }
            .folder { padding: 1.2rem 0.8rem; }
        }

        /* FOOTER */
        footer {
            background: rgba(3, 5, 12, 0.9);
            backdrop-filter: blur(20px);
            border-top: 2px solid rgba(0, 255, 255, 0.4);
            padding: 2.5rem 1rem 1.8rem;
            margin-top: 2rem;
        }
        .footer-logo {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            color: white;
            text-shadow: 0 0 20px cyan;
            margin-bottom: 1.5rem;
        }
        .social-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 20px 0;
        }
        .social-icons a {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 255, 0.08);
            border: 1.5px solid rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            transition: 0.25s;
            text-decoration: none;
        }
        .social-icons a:active {
            background: cyan;
            color: black;
            transform: scale(0.92);
        }
        @media (min-width: 1024px) {
            .social-icons a:hover {
                background: cyan;
                color: black;
                box-shadow: 0 0 30px cyan;
                transform: translateY(-5px);
            }
        }
        .copyright {
            text-align: center;
            font-size: 0.8rem;
            color: #9bc0e0;
            margin-top: 1.5rem;
        }

        /* MODAL BUY/SELL FUTURISTA */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: rgba(8, 16, 28, 0.98);
            border: 2px solid cyan;
            border-radius: 40px;
            padding: 2rem;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.4);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-header {
            margin-bottom: 1.5rem;
        }
        .modal-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(45deg, cyan, #ff44e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .modal-header p {
            color: #aad0ff;
            font-size: 1rem;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .action-btn {
            flex: 1;
            min-width: 120px;
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .buy-btn {
            background: linear-gradient(135deg, #00cc44, #00ff88);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.5);
        }
        .sell-btn {
            background: linear-gradient(135deg, #cc0044, #ff3366);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
        }
        .action-btn:active {
            transform: scale(0.96);
        }
        @media (min-width: 1024px) {
            .action-btn:hover {
                transform: translateY(-3px);
                filter: brightness(1.05);
            }
        }
        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: cyan;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal-btn:hover {
            color: #ff44e6;
            transform: rotate(90deg);
        }
        @media (max-width: 550px) {
            .action-buttons { flex-direction: column; gap: 12px; }
            .action-btn { width: 100%; }
            .modal-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="bg-image-layer"></div>
<div class="cyber-grid"></div>
<div class="glow-overlay"></div>

<div class="content">
    <!-- LOADER -->
    <div class="loader-container" id="loader">
        <div class="loader-ring"></div>
        <div class="loader-text">HEYDIN KAYSER DOCS</div>
        <div style="margin-top: 20px; font-size:0.9rem; letter-spacing:2px;">CARGANDO DOCUMENTOS VIP</div>
    </div>

    <header class="glass-header">
        <div class="nav-container">
            <div class="logo-area" onclick="window.location.href='home.html'">
                <i class="fas fa-chart-line logo-icon"></i>
                <span class="logo-text">HEYDIN KAYSER</span>
            </div>
            <div class="back-home" onclick="window.location.href='home.html'">
                <i class="fas fa-arrow-left"></i>
                <span>VOLVER AL PORTAL</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="hero-section">
            <h1 class="hero-title">DOCUMENTOS DE TRADING</h1>
            <p class="hero-subtitle">Accede a análisis, estrategias y señales cuánticas de élite</p>
        </div>

        <div class="search-container">
            <input type="text" class="search-box" id="searchInput" placeholder="Buscar documento (XAUSUSD, número...)" autocomplete="off">
            <i class="fas fa-search search-icon"></i>
        </div>

        <div class="grid-container" id="folders-container"></div>
    </div>

    <footer>
        <div class="footer-logo">
            <i class="fas fa-crown"></i> HEYDIN KAYSER TRADING
        </div>
        <div class="social-icons">
            <a href="https://heydin-kayser-vip.blogspot.com/" target="_blank"><i class="fab fa-blogger-b"></i></a>
            <a href="https://www.youtube.com/@heydinkayser2026" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.facebook.com/profile.php?id=61576490987991&locale=es_LA" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.tiktok.com/@heydin.kayser2026" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.mql5.com/en/channels/heydin-kayser-2026" target="_blank"><i class="fas fa-chart-simple"></i></a>
        </div>
        <div class="copyright">
            © 2025 HEYDIN KAYSER TRADING • TERMINAL CUÁNTICA • DOCUMENTOS VIP
        </div>
    </footer>
</div>

<!-- MODAL BUY/SELL -->
<div class="modal-overlay" id="actionModal">
    <div class="modal-content">
        <button class="close-modal-btn" id="closeModalBtn"><i class="fas fa-times"></i></button>
        <div class="modal-header">
            <h2 id="modalTitle">XAUSUSD 1</h2>
            <p>Selecciona la acción para este documento</p>
        </div>
        <div class="action-buttons">
            <button class="action-btn buy-btn" id="buyBtn">BUY</button>
            <button class="action-btn sell-btn" id="sellBtn">SELL</button>
        </div>
    </div>
</div>

<script>
    // LOADER
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.classList.add('fade-out');
            setTimeout(() => loader.style.display = 'none', 800);
        }, 1800);
    });

    // GENERAR 50 DOCUMENTOS (XAUSUSD 1 al 50)
    function generateDocuments() {
        const container = document.getElementById('folders-container');
        container.innerHTML = '';
        
        for (let i = 1; i <= 50; i++) {
            const folder = document.createElement('div');
            folder.classList.add('folder');
            folder.dataset.id = i;
            folder.dataset.search = `xaususd ${i} documento ${i}`;
            
            // Iconos variados para estilo
            const icons = ['fa-folder', 'fa-file-alt', 'fa-chart-line', 'fa-coins', 'fa-chart-simple', 'fa-candlestick-chart'];
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            
            folder.innerHTML = `
                <i class="fas ${randomIcon} folder-icon"></i>
                <div class="folder-name">XAUSUSD ${i}</div>
                <div class="folder-number">Documento VIP ${i}</div>
            `;
            
            folder.addEventListener('click', (e) => {
                e.stopPropagation();
                openActionModal(i);
            });
            
            container.appendChild(folder);
        }
    }
    
    // MODAL
    const modal = document.getElementById('actionModal');
    const modalTitle = document.getElementById('modalTitle');
    let currentDocId = null;
    
    function openActionModal(docId) {
        currentDocId = docId;
        modalTitle.textContent = `XAUSUSD ${docId}`;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    // Configurar eventos de los botones Buy/Sell (se regeneran dinámicamente)
    function setupModalButtons() {
        const buyBtn = document.getElementById('buyBtn');
        const sellBtn = document.getElementById('sellBtn');
        
        // Remover listeners antiguos clonando (evita duplicados)
        const newBuy = buyBtn.cloneNode(true);
        const newSell = sellBtn.cloneNode(true);
        buyBtn.parentNode.replaceChild(newBuy, buyBtn);
        sellBtn.parentNode.replaceChild(newSell, sellBtn);
        
        const finalBuy = document.getElementById('buyBtn');
        const finalSell = document.getElementById('sellBtn');
        
        finalBuy.addEventListener('click', () => {
            if (currentDocId) {
                window.location.href = `buy/index${currentDocId}.html`;
            }
        });
        
        finalSell.addEventListener('click', () => {
            if (currentDocId) {
                window.location.href = `sell/index${currentDocId}.html`;
            }
        });
    }
    
    // FUNCIÓN DE BÚSQUEDA
    function setupSearch() {
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function() {
            const term = this.value.toLowerCase().trim();
            const folders = document.querySelectorAll('.folder');
            
            folders.forEach(folder => {
                const folderName = folder.querySelector('.folder-name').textContent.toLowerCase();
                const folderNumber = folder.querySelector('.folder-number').textContent.toLowerCase();
                const id = folder.dataset.id;
                
                if (folderName.includes(term) || folderNumber.includes(term) || `xaususd ${id}`.includes(term)) {
                    folder.style.display = 'flex';
                } else {
                    folder.style.display = 'none';
                }
            });
        });
    }
    
    // Cerrar modal con botón, click fuera y Escape
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });
    
    // Inicializar todo
    document.addEventListener('DOMContentLoaded', () => {
        generateDocuments();
        setupSearch();
        setupModalButtons();
        // Reconfigurar botones cada vez que se abre modal (por si acaso)
        modal.addEventListener('click', (e) => {
            if (e.target.classList.contains('action-btn')) {
                // ya se maneja, pero aseguramos
            }
        });
    });
    
    // Al abrir el modal, refrescar eventos de los botones (por si se reasignan)
    const observer = new MutationObserver(() => {
        if (modal.classList.contains('active')) {
            setupModalButtons();
        }
    });
    observer.observe(modal, { attributes: true, attributeFilter: ['class'] });
    
    // También aseguramos al hacer click en el modal por si los botones cambian
    window.setupModalButtons = setupModalButtons;
</script>
</body>
</html>
