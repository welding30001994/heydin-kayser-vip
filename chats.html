<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jayden Chat - Comparte imágenes</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-storage-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0084ff;
            --primary-dark: #0073e6;
            --primary-light: #e3f2fd;
            --success: #00C851;
            --warning: #ffbb33;
            --danger: #ff4444;
            --dark: #1a1a1a;
            --darker: #0a0a0a;
            --light: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --card-bg: #1e293b;
            --message-sent: #0084ff;
            --message-received: #2d3e56;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --transition: all 0.2s ease;
            --header-height: 60px;
            --nav-height: 70px;
            --sidebar-width: 300px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* Desktop Layout */
        .desktop-layout {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-primary);
        }

        /* Sidebar - Visible en desktop */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-header {
            height: var(--header-height);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .logo span {
            font-weight: 600;
            font-size: 1rem;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .sidebar-nav {
            margin-bottom: 20px;
        }

        .nav-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .nav-option:hover,
        .nav-option.active {
            background: var(--gray-700);
            color: var(--text-primary);
        }

        .nav-option i {
            width: 24px;
            font-size: 1.2rem;
        }

        /* Mobile Layout */
        .mobile-layout {
            display: none;
            height: 100vh;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-primary);
            position: relative;
        }

        /* Header - Mobile */
        .mobile-header {
            height: var(--header-height);
            background: var(--bg-secondary);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Search Bar */
        .search-bar {
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-color);
            display: none;
        }

        .search-bar.active {
            display: block;
        }

        .search-container {
            background: var(--gray-800);
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-container i {
            color: var(--text-secondary);
        }

        .search-container input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 100%;
            outline: none;
            font-size: 0.95rem;
        }

        /* Main Content Area - Desktop */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            height: 100vh;
        }

        .chat-header {
            height: var(--header-height);
            background: var(--bg-secondary);
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn-mobile {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h3 {
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .chat-header-status {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-header-status i {
            font-size: 0.6rem;
        }

        .chat-header-status.online i {
            color: var(--success);
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 12px;
            position: relative;
            animation: messageIn 0.3s ease;
        }

        @media (max-width: 768px) {
            .message {
                max-width: 85%;
            }
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            background: var(--message-sent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: var(--message-received);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-content {
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--gray-800);
            border-radius: 24px;
            padding: 8px 12px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .message-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 100%;
            max-height: 100px;
            resize: none;
            outline: none;
            font-size: 0.95rem;
            font-family: inherit;
            line-height: 1.4;
            padding: 4px 0;
        }

        .attach-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            font-size: 1.2rem;
            transition: var(--transition);
            border-radius: 50%;
        }

        .attach-btn:hover {
            background: var(--gray-700);
            color: var(--text-primary);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .send-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Mobile Bottom Navigation */
        .bottom-nav {
            display: none;
            height: var(--nav-height);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 8px 0;
        }

        .nav-item {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.7rem;
        }

        .nav-item i {
            font-size: 1.3rem;
        }

        .nav-item.active {
            color: var(--primary);
        }

        /* Contacts/Status Lists */
        .list-container {
            height: 100%;
            overflow-y: auto;
            padding: 16px;
        }

        .contact-item,
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }

        .contact-item:hover,
        .chat-item:hover {
            background: var(--gray-700);
            transform: translateY(-1px);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
            color: white;
            position: relative;
            flex-shrink: 0;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            border: 2px solid var(--bg-secondary);
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-preview {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        /* Image Preview Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .image-modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            background: transparent;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Loading indicator for images */
        .image-loading {
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        /* Empty states */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Loading spinner */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .loading::after {
            content: "";
            width: 30px;
            height: 30px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-600);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-500);
        }

        /* Responsive Breakpoints */
        @media (min-width: 769px) {
            .mobile-layout {
                display: none !important;
            }
            .desktop-layout {
                display: flex;
            }
        }

        @media (max-width: 768px) {
            .desktop-layout {
                display: none !important;
            }
            .mobile-layout {
                display: flex;
            }
            
            .back-btn-mobile {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .chat-header {
                padding: 0 12px;
            }

            .messages-container {
                padding: 12px;
            }

            .input-area {
                padding: 8px 12px;
            }

            .bottom-nav {
                display: flex;
            }
        }

        /* Upload progress */
        .upload-progress {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            border: 1px solid var(--border-color);
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: var(--gray-700);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Desktop Layout -->
    <div class="desktop-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="https://raw.githubusercontent.com/welding30001994/Jayden_control/refs/heads/main/jayden.jpeg" alt="Logo">

            <div class="sidebar-content">

                    </div>

                    <i class="fas fa-search"></i>

        <!-- Main Chat Area -->
        <main class="main-area">
            <div class="chat-header">
                <div class="chat-header-info">

    <!-- Mobile Layout -->
    <div class="mobile-layout">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <div class="logo">
                <img src="https://raw.githubusercontent.com/welding30001994/Jayden_control/refs/heads/main/jayden.jpeg" alt="Logo">
                <span>Jayden Chat</span>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="mobileSearchBtn">
                    <i class="fas fa-search"></i>

        <div class="search-bar" id="mobileSearchBar">

        <!-- Mobile Content -->
        <main class="main-content" id="mobileContent">

        </main>

        <!-- Mobile Chat View (hidden by default) -->

            </div>
            <div class="messages-container" id="mobileChatMessages"></div>
            <div class="input-area">
                <div class="input-container">
                    <button class="attach-btn" id="mobileAttach">
                        <i class="fas fa-paperclip"></i>

                    <div class="input-wrapper">
                        <textarea class="message-input" id="mobileMessageInput" placeholder="Escribe un mensaje..." rows="1"></textarea>
                    </div>

        <!-- Mobile Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="chats">
                <i class="fas fa-comments"></i>

            <button class="nav-item" data-tab="contacts">
                <i class="fas fa-users"></i>
                <span>Contactos</span>

            <button class="nav-item" data-tab="status">
                <i class="fas fa-circle"></i>

    </div>

    <!-- Image Preview Modal -->
    <div class="image-modal" id="imageModal">
        <div class="modal-content">
            <img id="modalImage" src="" alt="Preview">
            <button class="close-modal" id="closeModal">&times;</button>
        </div>
    </div>

    <!-- Upload Progress -->
    <div class="upload-progress" id="uploadProgress" style="display: none;">
        <span>Subiendo imagen...</span>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB1Cs2os3tTfrMbYSAmDeJAGnP4tTtsFdw",
            authDomain: "beaver-trading.firebaseapp.com",
            databaseURL: "https://beaver-trading-default-rtdb.firebaseio.com",
            projectId: "beaver-trading",
            storageBucket: "beaver-trading.firebasestorage.app",
            messagingSenderId: "926610131904",
            appId: "1:926610131904:web:c147bd337bd12b4d085625"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        // Global variables
        let currentUser = null;
        let selectedChat = null;
        let currentChatListener = null;
        let usersCache = new Map();
        let contactsList = [];
        let isMobile = window.innerWidth <= 768;

        // Mock login for testing (remove in production)
        auth.signInAnonymously().catch(console.error);

        // Auth state observer
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                initializeApp();
            }
        });

        function initializeApp() {
            setupUser();
            setupPresence();
            loadUsers();
            loadChats();
            updateUI();
        }

        function setupUser() {
            const userRef = database.ref('users/' + currentUser.uid);
            userRef.once('value').then((snapshot) => {
                if (!snapshot.exists()) {
                    userRef.set({
                        name: 'Usuario ' + currentUser.uid.substr(0, 4),
                        email: currentUser.email || 'anon@ejemplo.com',
                        createdAt: firebase.database.ServerValue.TIMESTAMP
                    });
                }
            });
        }

        function setupPresence() {
            const userStatusRef = database.ref('status/' + currentUser.uid);
            const connectedRef = database.ref('.info/connected');

            connectedRef.on('value', (snapshot) => {
                if (snapshot.val() === true) {
                    userStatusRef.set({
                        state: 'online',
                        lastChanged: firebase.database.ServerValue.TIMESTAMP
                    });

                    userStatusRef.onDisconnect().set({
                        state: 'offline',
                        lastChanged: firebase.database.ServerValue.TIMESTAMP
                    });
                }
            });
        }

        function loadUsers() {
            database.ref('users').on('value', (snapshot) => {
                const users = snapshot.val() || {};
                contactsList = [];
                
                Object.entries(users).forEach(([userId, userData]) => {
                    if (userId !== currentUser.uid) {
                        contactsList.push({
                            id: userId,
                            ...userData
                        });
                        usersCache.set(userId, userData);
                    }
                });

                updateUI();
            });

            // Monitor online status
            database.ref('status').on('value', (snapshot) => {
                const statuses = snapshot.val() || {};
                usersCache.forEach((user, userId) => {
                    user.online = statuses[userId]?.state === 'online';
                });
                updateUI();
            });
        }

        function loadChats() {
            const chatsRef = database.ref('chats');
            
            chatsRef.on('child_added', (snapshot) => {
                updateChatLists();
            });

            chatsRef.on('child_changed', (snapshot) => {
                updateChatLists();
            });
        }

        async function updateChatLists() {
            const chats = await getRecentChats();
            renderChatList('desktopList', chats);
            if (isMobile) {
                renderMobileView('chats', chats);
            }
        }

        async function getRecentChats() {
            const chats = [];
            const chatPromises = [];

            usersCache.forEach((user, userId) => {
                const promise = getLastMessage(userId).then(message => {
                    if (message) {
                        chats.push({
                            userId,
                            user,
                            lastMessage: message
                        });
                    }
                });
                chatPromises.push(promise);
            });

            await Promise.all(chatPromises);
            return chats.sort((a, b) => (b.lastMessage?.timestamp || 0) - (a.lastMessage?.timestamp || 0));
        }

        async function getLastMessage(userId) {
            const chatId = getChatId(currentUser.uid, userId);
            const snapshot = await database.ref('chats/' + chatId).orderByKey().limitToLast(1).once('value');
            const messages = snapshot.val();
            return messages ? Object.values(messages)[0] : null;
        }

        function renderChatList(containerId, chats) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (chats.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p>No hay conversaciones</p>
                        <small>Inicia un chat desde contactos</small>
                    </div>
                `;
                return;
            }

            container.innerHTML = chats.map(chat => `
                <div class="chat-item" data-user-id="${chat.userId}">
                    <div class="avatar">
                        ${chat.user.name?.charAt(0).toUpperCase() || 'U'}
                        <div class="online-indicator" style="display: ${chat.user.online ? 'block' : 'none'}"></div>
                    </div>
                    <div class="item-info">
                        <div class="item-name">${chat.user.name || 'Usuario'}</div>
                        <div class="item-preview">${formatMessagePreview(chat.lastMessage)}</div>
                    </div>
                    <div class="item-time">${formatTime(chat.lastMessage?.timestamp)}</div>
                </div>
            `).join('');

            // Add click listeners
            container.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', () => {
                    const userId = item.dataset.userId;
                    const user = usersCache.get(userId);
                    if (user) openChat(userId, user);
                });
            });
        }

        function formatMessagePreview(message) {
            if (!message) return 'Inicia una conversación';
            if (message.imageUrl) return '📷 Imagen';
            return message.text || 'Mensaje';
        }

        function renderContacts(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (contactsList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>No hay contactos</p>
                        <small>Espera a que otros usuarios se unan</small>
                    </div>
                `;
                return;
            }

            container.innerHTML = contactsList.map(contact => `
                <div class="contact-item" data-user-id="${contact.id}">
                    <div class="avatar">
                        ${contact.name?.charAt(0).toUpperCase() || 'U'}
                        <div class="online-indicator" style="display: ${contact.online ? 'block' : 'none'}"></div>
                    </div>
                    <div class="item-info">
                        <div class="item-name">${contact.name || 'Usuario'}</div>
                        <div class="item-preview">${contact.online ? 'En línea' : 'Desconectado'}</div>
                    </div>
                </div>
            `).join('');

            container.querySelectorAll('.contact-item').forEach(item => {
                item.addEventListener('click', () => {
                    const userId = item.dataset.userId;
                    const user = usersCache.get(userId);
                    if (user) openChat(userId, user);
                });
            });
        }

        function renderStatus(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            database.ref('status_updates').orderByChild('timestamp').limitToLast(20).once('value', (snapshot) => {
                const updates = snapshot.val() || {};
                
                if (Object.keys(updates).length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-circle"></i>
                            <p>No hay actualizaciones</p>
                        </div>
                    `;
                    return;
                }

                const updatesArray = Object.entries(updates)
                    .map(([id, data]) => ({ id, ...data }))
                    .sort((a, b) => b.timestamp - a.timestamp)
                    .slice(0, 10);

                container.innerHTML = updatesArray.map(update => {
                    const user = usersCache.get(update.userId);
                    return `
                        <div class="contact-item">
                            <div class="avatar">
                                ${user?.name?.charAt(0).toUpperCase() || 'U'}
                            </div>
                            <div class="item-info">
                                <div class="item-name">${user?.name || 'Usuario'}</div>
                                <div class="item-preview">${update.text || '📷 Actualización'}</div>
                            </div>
                            <div class="item-time">${formatTime(update.timestamp)}</div>
                        </div>
                    `;
                }).join('');
            });
        }

        function renderMobileView(tab, data = null) {
            const content = document.getElementById('mobileContent');
            if (!content) return;

            switch(tab) {
                case 'chats':
                    renderChatList('desktopList', data || []);
                    content.innerHTML = document.getElementById('desktopList').innerHTML;
                    break;
                case 'contacts':
                    renderContacts('desktopList');
                    content.innerHTML = document.getElementById('desktopList').innerHTML;
                    break;
                case 'status':
                    renderStatus('desktopList');
                    content.innerHTML = document.getElementById('desktopList').innerHTML;
                    break;
            }
        }

        async function openChat(userId, user) {
            selectedChat = { userId, user };
            
            // Update UI based on device
            if (isMobile) {
                document.getElementById('mobileContent').style.display = 'none';
                document.querySelector('.bottom-nav').style.display = 'none';
                document.getElementById('mobileChatView').style.display = 'flex';
                
                document.getElementById('mobileChatName').textContent = user.name || 'Usuario';
                document.getElementById('mobileChatAvatar').textContent = user.name?.charAt(0).toUpperCase() || 'U';
                updateChatStatusUI('mobile', user.online);
            } else {
                document.getElementById('desktopChatName').textContent = user.name || 'Usuario';
                updateChatStatusUI('desktop', user.online);
                document.getElementById('desktopInput').style.display = 'block';
            }

            // Load messages
            loadMessages(userId);
        }

        function updateChatStatusUI(platform, online) {
            const statusEl = document.getElementById(platform + 'ChatStatus');
            const className = `chat-header-status ${online ? 'online' : 'offline'}`;
            statusEl.className = className;
            statusEl.innerHTML = `
                <i class="fas fa-circle"></i>
                <span>${online ? 'En línea' : 'Desconectado'}</span>
            `;
        }

        function loadMessages(userId) {
            const chatId = getChatId(currentUser.uid, userId);
            const messagesContainer = isMobile ? 
                document.getElementById('mobileChatMessages') : 
                document.getElementById('desktopMessages');
            
            if (currentChatListener) {
                currentChatListener.off();
            }

            messagesContainer.innerHTML = '<div class="loading"></div>';

            currentChatListener = database.ref('chats/' + chatId).orderByKey().limitToLast(50);
            currentChatListener.on('value', (snapshot) => {
                const messages = snapshot.val() || {};
                displayMessages(messages, messagesContainer);
            });
        }

        function displayMessages(messages, container) {
            container.innerHTML = '';

            if (Object.keys(messages).length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="far fa-comment-dots"></i>
                        <p>No hay mensajes</p>
                        <small>Envía el primer mensaje</small>
                    </div>
                `;
                return;
            }

            const messagesArray = Object.entries(messages)
                .map(([id, data]) => ({ id, ...data }))
                .sort((a, b) => a.timestamp - b.timestamp);

            messagesArray.forEach(message => {
                const messageEl = document.createElement('div');
                const isSent = message.senderId === currentUser.uid;
                
                messageEl.className = `message ${isSent ? 'sent' : 'received'}`;
                
                let content = '';
                if (message.imageUrl) {
                    content += `<img src="${message.imageUrl}" class="message-image" onclick="openImageModal('${message.imageUrl}')">`;
                }
                if (message.text) {
                    content += `<div class="message-content">${escapeHtml(message.text)}</div>`;
                }
                
                messageEl.innerHTML = `
                    ${content}
                    <div class="message-time">${formatTime(message.timestamp)}</div>
                `;
                
                container.appendChild(messageEl);
            });

            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage(text, imageFile = null) {
            if (!selectedChat || (!text && !imageFile)) return;

            const chatId = getChatId(currentUser.uid, selectedChat.userId);
            const messageRef = database.ref('chats/' + chatId).push();
            const messageId = messageRef.key;

            const messageData = {
                senderId: currentUser.uid,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                read: false
            };

            if (text) {
                messageData.text = text;
            }

            if (imageFile) {
                showUploadProgress();
                
                try {
                    const imageUrl = await uploadImage(imageFile, messageId);
                    messageData.imageUrl = imageUrl;
                    hideUploadProgress();
                } catch (error) {
                    console.error('Error uploading image:', error);
                    alert('Error al subir la imagen');
                    hideUploadProgress();
                    return;
                }
            }

            await messageRef.set(messageData);

            // Clear input
            const input = isMobile ? 
                document.getElementById('mobileMessageInput') : 
                document.getElementById('desktopMessageInput');
            if (input) {
                input.value = '';
                input.style.height = 'auto';
            }
        }

        async function uploadImage(file, messageId) {
            const storageRef = storage.ref();
            const imageRef = storageRef.child(`chat_images/${messageId}_${file.name}`);
            
            return new Promise((resolve, reject) => {
                const uploadTask = imageRef.put(file);
                
                uploadTask.on('state_changed',
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        document.getElementById('progressFill').style.width = progress + '%';
                    },
                    (error) => {
                        reject(error);
                    },
                    async () => {
                        const downloadUrl = await uploadTask.snapshot.ref.getDownloadURL();
                        resolve(downloadUrl);
                    }
                );
            });
        }

        function showUploadProgress() {
            document.getElementById('uploadProgress').style.display = 'flex';
        }

        function hideUploadProgress() {
            document.getElementById('uploadProgress').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
        }

        function openImageModal(imageUrl) {
            document.getElementById('modalImage').src = imageUrl;
            document.getElementById('imageModal').classList.add('active');
        }

        function getChatId(uid1, uid2) {
            return [uid1, uid2].sort().join('_');
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Ahora';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
            if (diff < 86400000 && date.getDate() === now.getDate()) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            if (diff < 172800000 && date.getDate() === now.getDate() - 1) {
                return 'Ayer';
            }
            return date.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateUI() {
            getRecentChats().then(chats => {
                renderChatList('desktopList', chats);
                if (isMobile) {
                    const activeTab = document.querySelector('.nav-item.active')?.dataset.tab || 'chats';
                    if (activeTab === 'chats') {
                        renderMobileView('chats', chats);
                    } else if (activeTab === 'contacts') {
                        renderContacts('desktopList');
                        renderMobileView('contacts');
                    } else {
                        renderStatus('desktopList');
                        renderMobileView('status');
                    }
                }
            });
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Desktop navigation
            document.querySelectorAll('.nav-option').forEach(option => {
                option.addEventListener('click', () => {
                    document.querySelectorAll('.nav-option').forEach(opt => opt.classList.remove('active'));
                    option.classList.add('active');
                    
                    const view = option.dataset.view;
                    if (view === 'chats') {
                        getRecentChats().then(chats => renderChatList('desktopList', chats));
                    } else if (view === 'contacts') {
                        renderContacts('desktopList');
                    } else {
                        renderStatus('desktopList');
                    }
                });
            });

            // Mobile navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                    
                    const tab = item.dataset.tab;
                    if (tab === 'chats') {
                        getRecentChats().then(chats => renderMobileView('chats', chats));
                    } else if (tab === 'contacts') {
                        renderMobileView('contacts');
                    } else {
                        renderMobileView('status');
                    }
                });
            });

            // Close mobile chat
            document.getElementById('closeMobileChat').addEventListener('click', () => {
                document.getElementById('mobileChatView').style.display = 'none';
                document.getElementById('mobileContent').style.display = 'block';
                document.querySelector('.bottom-nav').style.display = 'flex';
                
                if (currentChatListener) {
                    currentChatListener.off();
                }
            });

            // Send message handlers
            const sendHandlers = [
                { btn: 'desktopSend', input: 'desktopMessageInput' },
                { btn: 'mobileSend', input: 'mobileMessageInput' }
            ];

            sendHandlers.forEach(({ btn, input }) => {
                document.getElementById(btn)?.addEventListener('click', () => {
                    const text = document.getElementById(input)?.value;
                    sendMessage(text);
                });

                document.getElementById(input)?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage(e.target.value);
                    }
                });

                // Auto-resize
                document.getElementById(input)?.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
            });

            // Attach image handlers
            const attachButtons = ['desktopAttach', 'mobileAttach'];
            attachButtons.forEach(btnId => {
                document.getElementById(btnId)?.addEventListener('click', () => {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            sendMessage('', file);
                        }
                    };
                    input.click();
                });
            });

            // Image modal
            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('imageModal').classList.remove('active');
            });

            document.getElementById('imageModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('imageModal')) {
                    document.getElementById('imageModal').classList.remove('active');
                }
            });

            // Mobile search
            document.getElementById('mobileSearchBtn').addEventListener('click', () => {
                document.getElementById('mobileSearchBar').classList.toggle('active');
            });

            // Window resize handler
            window.addEventListener('resize', () => {
                const wasMobile = isMobile;
                isMobile = window.innerWidth <= 768;
                
                if (wasMobile !== isMobile) {
                    window.location.reload(); // Simple reload for layout change
                }
            });

            // Initialize
            updateUI();
        });
    </script>
</body>
</html>
