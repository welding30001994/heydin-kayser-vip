<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>YESLY ADELAY · Dashboard VIP</title>
    <!-- Firebase SDK -->

    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->

    <style>
        :root {
            --primary: #00f0ff;
            --accent: #ff44e6;
            --gold: #ffd700;
            --dark: #0a0a1a;
            --darker: #050510;
            --light: #e0e0ff;
            --card-bg: rgba(15, 15, 35, 0.7);
            --neon-glow: 0 0 10px var(--primary), 0 0 20px rgba(0, 240, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', 'Orbitron', 'Syne', sans-serif;
            background: var(--darker);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            color: #eef5ff;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(255, 68, 230, 0.05) 0%, transparent 40%),
                linear-gradient(to bottom, var(--darker), var(--dark));
        }

        .bg-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/welding30001994/heydin-kayser-vip/refs/heads/main/YESLY.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0.06;
            z-index: 0;
            pointer-events: none;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        .glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.03), rgba(0, 0, 0, 0.92));
            z-index: 2;
            pointer-events: none;
        }

        .floating-diamonds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .diamond {
            position: absolute;
            width: 10px;
            height: 10px;
            background: transparent;
            border: 1px solid var(--primary);
            transform: rotate(45deg);
            opacity: 0.15;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: rotate(45deg) translateY(0) rotate(0deg); opacity: 0.15; }
            50% { transform: rotate(45deg) translateY(-20px) rotate(180deg); opacity: 0.4; }
        }

        .vip-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .vip-particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.25;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 15;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* LOADER */
        .loader-container {
            position: fixed;
            inset: 0;
            background: #01010b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
            backdrop-filter: blur(12px);
        }
        .loader-container.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .loader-ring {
            width: 70px;
            height: 70px;
            border: 3px solid rgba(0,255,255,0.2);
            border-top: 3px solid var(--primary);
            border-right: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 25px var(--primary);
        }
        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }
        .loader-text {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 200;
            padding: 10px 0;
            background: rgba(10, 10, 26, 0.88);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 240, 255, 0.15);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .logo i {
            color: var(--primary);
            font-size: 1.5rem;
            filter: drop-shadow(0 0 8px var(--primary));
        }

        .logo span {
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .user-name {
            color: var(--primary);
            font-size: clamp(0.6rem, 1.3vw, 0.8rem);
            font-weight: 700;
            text-shadow: 0 0 8px var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            background: rgba(0, 240, 255, 0.05);
        }

        .user-name i {
            font-size: 0.7rem;
        }

        .logout-btn {
            padding: 6px 16px;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-size: 0.65rem;
        }

        .logout-btn:hover {
            background: rgba(0, 240, 255, 0.1);
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(0, 240, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 240, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-avatar:hover {
            background: rgba(0, 240, 255, 0.2);
            transform: scale(1.05);
        }

        /* BIENVENIDA */
        .welcome-section {
            text-align: center;
            padding: 18px 20px 5px;
        }

        .welcome-title {
            font-size: clamp(1.1rem, 3vw, 2.2rem);
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            background: linear-gradient(45deg, #fff, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(0,255,255,0.15);
            letter-spacing: 0.5px;
        }

        .welcome-subtitle {
            font-size: clamp(0.65rem, 1.5vw, 0.9rem);
            color: #b3e4ff;
            text-shadow: 0 0 8px rgba(0,255,255,0.12);
            margin-top: 4px;
        }

        /* RELOJ */
        .time-container {
            display: flex;
            justify-content: center;
            margin: 6px 0 12px;
            padding: 0 20px;
        }

        .neon-clock {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1.5px solid var(--primary);
            border-radius: 40px;
            padding: 5px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: var(--neon-glow);
        }

        .neon-clock i {
            font-size: 0.8rem;
            color: var(--primary);
            filter: drop-shadow(0 0 6px var(--primary));
        }

        #current-time {
            font-size: clamp(0.75rem, 1.8vw, 1rem);
            font-weight: 800;
            color: white;
            text-shadow: 0 0 8px var(--primary);
            font-family: 'Orbitron', monospace;
        }

        #current-date {
            font-size: clamp(0.45rem, 1.2vw, 0.65rem);
            color: var(--accent);
            text-shadow: 0 0 6px var(--accent);
        }

        /* ===== DASHBOARD GRID FIJO ===== */
        .dashboard-grid {
            flex: 1;
            padding: 10px 20px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .grid-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 10px;
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--light);
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 240, 255, 0.1);
            cursor: pointer;
            min-height: 110px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .grid-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.05), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .grid-card:hover::before {
            opacity: 1;
        }

        .grid-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.15);
        }

        .grid-card i {
            font-size: 2rem;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            color: var(--primary);
        }

        .grid-card:hover i {
            transform: scale(1.15);
        }

        .grid-card span {
            line-height: 1.2;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* Colores personalizados por categoría */
        .card-gold { border-color: rgba(255, 215, 0, 0.15); }
        .card-gold i { color: var(--gold); }
        .card-gold:hover { border-color: var(--gold); box-shadow: 0 8px 25px rgba(255, 215, 0, 0.15); }

        .card-vip { border-color: rgba(255, 68, 230, 0.15); }
        .card-vip i { color: var(--accent); }
        .card-vip:hover { border-color: var(--accent); box-shadow: 0 8px 25px rgba(255, 68, 230, 0.15); }

        .card-cyan { border-color: rgba(0, 255, 255, 0.15); }
        .card-cyan i { color: var(--primary); }
        .card-cyan:hover { border-color: var(--primary); box-shadow: 0 8px 25px rgba(0, 255, 255, 0.15); }

        /* Efecto de selección al hacer click */
        .grid-card:active {
            transform: scale(0.95);
        }

        /* DESCARGA */
        .download-section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 16px 25px;
            margin: 5px 20px 25px;
            border: 1px solid rgba(255, 68, 230, 0.15);
            box-shadow: 0 8px 25px rgba(255, 68, 230, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            text-align: center;
            transition: all 0.3s ease;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .download-section:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        @media (min-width: 480px) {
            .download-section {
                flex-direction: row;
                padding: 16px 30px;
                margin: 5px 20px 25px;
            }
        }

        .download-info h2 {
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            font-weight: 900;
            color: white;
            text-shadow: 0 0 12px var(--accent);
        }

        .download-info p {
            font-size: clamp(0.5rem, 1.2vw, 0.7rem);
            color: #aaffff;
        }

        .download-btn {
            background: linear-gradient(145deg, var(--accent), #7700ff);
            border: none;
            padding: 8px 22px;
            border-radius: 4px;
            font-size: clamp(0.65rem, 1.4vw, 0.8rem);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 68, 230, 0.25);
            color: white;
            white-space: nowrap;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(255, 68, 230, 0.4);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        /* FOOTER */
        footer {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 240, 255, 0.15);
            padding: 25px 20px 18px;
            text-align: center;
        }

        .footer-logo {
            font-size: 0.9rem;
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            color: white;
            text-shadow: 0 0 12px var(--primary);
            margin-bottom: 12px;
        }

        .footer-logo i {
            color: var(--primary);
        }

        .social-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
        }

        .social-icons a {
            width: 35px;
            height: 35px;
            background: rgba(0, 255, 255, 0.04);
            border: 1px solid rgba(0, 255, 255, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: white;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icons a:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px var(--primary);
            transform: translateY(-3px);
        }

        .social-icons a:active {
            transform: scale(0.9);
        }

        .copyright {
            text-align: center;
            font-size: 0.5rem;
            color: rgba(224, 224, 255, 0.5);
            margin-top: 12px;
            font-family: 'Rajdhani', sans-serif;
        }

        /* Ajustes responsive */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }
            .grid-card {
                min-height: 90px;
                padding: 14px 8px;
            }
            .grid-card i {
                font-size: 1.6rem;
                margin-bottom: 6px;
            }
            .grid-card span {
                font-size: 0.6rem;
            }
            .dashboard-grid {
                padding: 8px 12px 15px;
            }
            .download-section {
                padding: 12px 16px;
                margin: 5px 12px 18px;
            }
            .nav-container {
                padding: 0 12px;
            }
            .logo {
                font-size: 1rem;
            }
            .logo i {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 400px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .grid-card {
                min-height: 80px;
                padding: 10px 5px;
                font-size: 0.6rem;
            }
            .grid-card i {
                font-size: 1.3rem;
                margin-bottom: 4px;
            }
            .grid-card span {
                font-size: 0.5rem;
            }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 901px) and (max-width: 1100px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 1101px) {
            .grid-container {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        @media (max-height: 550px) and (orientation: landscape) {
            .welcome-section {
                padding: 8px 15px 3px;
            }
            .welcome-title {
                font-size: 1rem;
            }
            .time-container {
                margin: 3px 0 6px;
            }
            .neon-clock {
                padding: 3px 12px;
            }
            .dashboard-grid {
                padding: 5px 12px 10px;
            }
            .grid-card {
                min-height: 60px;
                padding: 8px 5px;
            }
            .grid-card i {
                font-size: 1.2rem;
                margin-bottom: 3px;
            }
            .grid-card span {
                font-size: 0.5rem;
            }
            .download-section {
                padding: 8px 16px;
                margin: 3px 12px 12px;
            }
            footer {
                padding: 10px 15px 8px;
            }
            .social-icons a {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
