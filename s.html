    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Syne:wght@400;700;800;900&family=Rajdhani:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', 'Orbitron', 'Syne', sans-serif;
            background: #03050b;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            color: #eef5ff;
        }

        .bg-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/welding30001994/heydin-kayser-vip/refs/heads/main/YESLY.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.03) 0px, rgba(0, 255, 255, 0.03) 1px, transparent 1px, transparent 40px),
                repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.03) 0px, rgba(0, 255, 255, 0.03) 1px, transparent 1px, transparent 40px);
            z-index: 1;
            pointer-events: none;
        }

        .glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.04), rgba(0, 0, 0, 0.92));
            z-index: 2;
            pointer-events: none;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 15;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* LOADER */
        .loader-container {
            position: fixed;
            inset: 0;
            background: #01010b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
            backdrop-filter: blur(12px);
        }
        .loader-container.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .loader-ring {
            width: 70px;
            height: 70px;
            border: 3px solid rgba(0,255,255,0.2);
            border-top: 3px solid #0cf;
            border-right: 3px solid #f0f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 25px cyan;
        }
        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }
        .loader-text {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(45deg, cyan, #ff44e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* HEADER */
        .glass-header {
            background: rgba(5, 10, 20, 0.65);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding: 0.3rem 0.8rem;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo-icon {
            font-size: 1.2rem;
            color: #0cf;
            filter: drop-shadow(0 0 6px cyan);
        }
        .logo-text {
            font-size: 0.85rem;
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, #fff, #0cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 0.5px;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .user-name {
            color: #0cf;
            font-size: clamp(0.6rem, 2vw, 0.85rem);
            font-weight: 700;
            text-shadow: 0 0 8px cyan;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,255,255,0.06);
            padding: 3px 10px;
            border-radius: 30px;
            border: 1px solid rgba(0,255,255,0.2);
        }
        .user-name i {
            font-size: 0.7rem;
        }
        .logout-btn {
            background: transparent;
            border: 1.5px solid #ff3366;
            color: #ff3366;
            padding: 3px 12px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.55rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .logout-btn i {
            font-size: 0.6rem;
        }
        .logout-btn:hover {
            background: #ff3366;
            color: black;
            box-shadow: 0 0 20px #ff3366;
        }

        /* BIENVENIDA */
        .welcome-section {
            text-align: center;
            padding: 0.5rem 0.5rem 0.2rem;
        }
        .welcome-title {
            font-size: clamp(0.85rem, 3vw, 1.5rem);
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            background: linear-gradient(45deg, #fff, cyan, #ff44e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(0,255,255,0.2);
            letter-spacing: 0.5px;
        }
        .welcome-subtitle {
            font-size: clamp(0.5rem, 1.5vw, 0.75rem);
            color: #b3e4ff;
            text-shadow: 0 0 8px rgba(0,255,255,0.15);
        }

        /* RELOJ */
        .time-container {
            display: flex;
            justify-content: center;
            margin: 0.1rem 0 0.5rem;
            padding: 0 8px;
        }
        .neon-clock {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1.5px solid cyan;
            border-radius: 40px;
            padding: 3px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 0 20px cyan;
        }
        .neon-clock i {
            font-size: 0.8rem;
            color: cyan;
            filter: drop-shadow(0 0 6px cyan);
        }
        #current-time {
            font-size: clamp(0.7rem, 2vw, 1rem);
            font-weight: 800;
            color: white;
            text-shadow: 0 0 8px cyan;
            font-family: 'Orbitron', monospace;
        }
        #current-date {
            font-size: clamp(0.45rem, 1.4vw, 0.65rem);
            color: #ff44e6;
            text-shadow: 0 0 6px #ff44e6;
        }

        /* ===== GRID DE BLOGS ===== */
        .blog-grid-wrapper {
            flex: 1;
            padding: 0.5rem 1rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }

        .blog-card {
            background: rgba(8, 18, 35, 0.75);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(0, 255, 255, 0.15);
            border-radius: 24px;
            padding: 1.2rem 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            color: white;
            min-height: 120px;
            position: relative;
            overflow: hidden;
        }

        .blog-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.05), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .blog-card:hover::before {
            opacity: 1;
        }

        .blog-card:active {
            transform: scale(0.94);
        }

        .blog-card i {
            font-size: 2rem;
            color: cyan;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            margin-bottom: 6px;
            transition: all 0.4s ease;
        }

        .blog-card:hover i {
            color: #ff44e6;
            text-shadow: 0 0 30px rgba(255, 68, 230, 0.5);
            transform: scale(1.1) translateY(-2px);
        }

        .blog-card .blog-label {
            font-weight: 700;
            font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            background: linear-gradient(135deg, #fff, #aaffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .blog-card .blog-sub {
            font-size: 0.5rem;
            color: #5a8a9a;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .blog-card.selected {
            border-color: #ff44e6;
            box-shadow: 0 0 40px rgba(255, 68, 230, 0.3), inset 0 0 30px rgba(255, 68, 230, 0.05);
            transform: scale(1.03);
        }

        @media (min-width: 768px) {
            .blog-card:hover {
                border-color: #ff44e6;
                box-shadow: 0 0 40px rgba(255, 68, 230, 0.2);
                transform: translateY(-6px) scale(1.02);
            }
        }

        @media (max-width: 480px) {
            .blog-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 0.7rem;
            }
            .blog-card {
                min-height: 100px;
                padding: 0.9rem 0.5rem;
                border-radius: 18px;
            }
            .blog-card i {
                font-size: 1.6rem;
            }
        }

        /* DESCARGA */
        .download-section {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            margin: 0.3rem 1.2rem 0.8rem;
            border: 1.5px solid #ff44e6;
            box-shadow: 0 0 25px rgba(255, 68, 230, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            text-align: center;
        }
        @media (min-width: 480px) {
            .download-section {
                flex-direction: row;
                padding: 0.6rem 1.5rem;
                margin: 0.3rem 1.5rem 0.8rem;
            }
        }
        .download-info h2 {
            font-size: clamp(0.75rem, 2.5vw, 1.1rem);
            font-weight: 900;
            color: white;
            text-shadow: 0 0 12px #ff44e6;
        }
        .download-info p {
            font-size: clamp(0.5rem, 1.4vw, 0.75rem);
            color: #aaffff;
        }
        .download-btn {
            background: linear-gradient(145deg, #ff44e6, #7700ff);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: clamp(0.65rem, 1.6vw, 0.85rem);
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 0 15px #ff44e6;
            color: white;
            white-space: nowrap;
        }
        .download-btn:active {
            transform: scale(0.95);
        }

        /* FOOTER */
        footer {
            background: rgba(3, 5, 12, 0.8);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding: 0.8rem 0.8rem 0.5rem;
        }
        .footer-logo {
            text-align: center;
            font-size: 0.8rem;
            font-weight: 900;
            font-family: 'Syne', sans-serif;
            color: white;
            text-shadow: 0 0 12px cyan;
            margin-bottom: 0.5rem;
        }
        .social-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 5px 0;
        }
        .social-icons a {
            width: 32px;
            height: 32px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: white;
            transition: 0.25s;
        }
        .social-icons a:active {
            background: cyan;
            color: black;
            transform: scale(0.9);
        }
        @media (min-width: 1024px) {
            .social-icons a:hover {
                background: cyan;
                color: black;
                box-shadow: 0 0 20px cyan;
                transform: translateY(-2px);
            }
        }
        .copyright {
            text-align: center;
            font-size: 0.45rem;
            color: #9bc0e0;
            margin-top: 0.5rem;
        }
    </style>
</head>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyB1Cs2os3tTfrMbYSAmDeJAGnP4tTtsFdw",
        authDomain: "beaver-trading.firebaseapp.com",
        databaseURL: "https://beaver-trading-default-rtdb.firebaseio.com",
        projectId: "beaver-trading",
        storageBucket: "beaver-trading.firebasestorage.app",
        messagingSenderId: "926610131904",
        appId: "1:926610131904:web:c147bd337bd12b4d085625"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // LOADER
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.classList.add('fade-out');
            setTimeout(() => loader.style.display = 'none', 800);
        }, 1500);
    });

    function showLoaderMsg(msg) {
        const loader = document.getElementById('loader');
        if (loader.style.display === 'none') loader.style.display = 'flex';
        loader.classList.remove('fade-out');
        document.querySelector('.loader-text').textContent = msg || 'PROCESANDO...';
    }
    function hideLoader() {
        const loader = document.getElementById('loader');
        loader.classList.add('fade-out');
        setTimeout(() => loader.style.display = 'none', 600);
    }

    // PARTICULAS
    particlesJS('particles-js', {
        particles: {
            number: { value: 40, density: { enable: true, value_area: 500 } },
            color: { value: "#00ffff" },
            shape: { type: "circle" },
            opacity: { value: 0.25, random: true },
            size: { value: 1.5, random: true },
            line_linked: { enable: true, distance: 100, color: "#00ffff", opacity: 0.1, width: 1 },
            move: { enable: true, speed: 0.6, direction: "none", random: true, out_mode: "out" }
        },
        interactivity: {
            events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" } }
        },
        retina_detect: true
    });

    // RELOJ
    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').textContent = now.toLocaleTimeString('es-ES', { hour12: false });
        document.getElementById('current-date').textContent = now.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ===== DATOS DE BLOGS =====
    const blogsData = [
        { icon: 'fa-blogger', label: 'Blogger', link: 'https://yesly-adelay-trading.blogspot.com/', sub: 'Blog oficial' },
        { icon: 'fa-youtube', label: 'YouTube', link: 'https://www.youtube.com/@yeslyadelay2026', sub: 'Videos' },
        { icon: 'fa-facebook', label: 'Facebook', link: 'https://www.facebook.com/profile.php?id=61590192674936', sub: 'Perfil' },
        { icon: 'fa-tiktok', label: 'TikTok', link: 'https://www.tiktok.com/@yeslyadelaytrading2026', sub: 'Cortos' },
        { icon: 'fa-telegram', label: 'Telegram', link: 'https://t.me/yesly_adelay', sub: 'Canal' },
        { icon: 'fa-whatsapp', label: 'WhatsApp', link: 'https://wa.me/593991987552', sub: 'Contacto' },
        { icon: 'fa-chart-line', label: 'MQL5', link: 'https://www.mql5.com/en/channels/yesly_adelay_trading_2026', sub: 'Señales' },
        { icon: 'fa-facebook-messenger', label: 'Messenger', link: 'https://www.facebook.com/messages/t/61590192674936', sub: 'Chat' },
        { icon: 'fa-instagram', label: 'Instagram', link: 'https://www.instagram.com/yesly_adelay/', sub: 'Perfil' },
        { icon: 'fa-twitter', label: 'Twitter / X', link: 'https://twitter.com/yesly_adelay', sub: 'Tweets' },
        { icon: 'fa-github', label: 'GitHub', link: 'https://github.com/yeslyadelay', sub: 'Código' },
        { icon: 'fa-js', label: 'Web3', link: 'https://yesly-adelay-web3.vercel.app', sub: 'DApp' },
        { icon: 'fa-file-pdf', label: 'PDF', link: 'pdf.html', sub: 'Documentos' },
        { icon: 'fa-cubes', label: 'Módulos', link: 'modulos.html', sub: 'Herramientas' },
        { icon: 'fa-robot', label: 'IA', link: 'https://chat.openai.com', sub: 'Asistente' },
        { icon: 'fa-coins', label: 'Crypto', link: 'crypto.html', sub: 'Mercado' },
        { icon: 'fa-newspaper', label: 'Noticias', link: 'noticias.html', sub: 'Actualidad' },
        { icon: 'fa-rocket', label: 'VIP', link: 'vip.html', sub: 'Acceso' }
    ];

    const blogGrid = document.getElementById('blogGrid');

    blogsData.forEach((blog) => {
        const card = document.createElement('div');
        card.className = 'blog-card';
        card.innerHTML = `
            <i class="fas ${blog.icon}"></i>
            <span class="blog-label">${blog.label}</span>
            <span class="blog-sub">${blog.sub || 'Blog'}</span>
        `;
        card.addEventListener('click', () => {
            // Efecto de selección
            document.querySelectorAll('.blog-card').forEach(el => el.classList.remove('selected'));
            card.classList.add('selected');
            // Redirigir después de un breve momento
            setTimeout(() => {
                window.open(blog.link, '_blank');
                card.classList.remove('selected');
            }, 400);
        });
        blogGrid.appendChild(card);
    });

    // ========== AUTENTICACIÓN ==========
    auth.onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = 'index.html';
        } else {
            const userId = user.uid;
            database.ref('users/' + userId).once('value').then((snapshot) => {
                const userData = snapshot.val();
                let displayName = 'Trader';
                if (userData && userData.fullName) {
                    displayName = userData.fullName.split(' ')[0];
                } else if (userData && userData.name) {
                    displayName = userData.name.split(' ')[0];
                } else if (user.email) {
                    displayName = user.email.split('@')[0];
                }
                document.querySelector('#displayName span').textContent = displayName;
                document.getElementById('welcomeMessage').innerHTML = `BIENVENIDO, ${displayName.toUpperCase()}`;
            }).catch(() => {
                document.querySelector('#displayName span').textContent = 'TRADER';
            });
        }
    });

    // CERRAR SESIÓN
    document.getElementById('logoutBtn').addEventListener('click', () => {
        showLoaderMsg('Cerrando sesión...');
        auth.signOut().then(() => {
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        }).catch((err) => {
            alert('Error: ' + err.message);
            hideLoader();
        });
    });
</script>
</body>
</html>
